# AEB Agent 配置文件
#
# 这个配置定义了 AEB 场景分析的完整 Prompt 结构
# 所有组件都通过模板文件定义，实现了配置与代码的完全分离

version: "1.0.0"
description: "超声波检测是否误检场景分析 Agent"

# System 消息组件（基础层）
# 这些组件定义了 AI 的角色、术语和分析原则
system_components:
  - template: "layer1_foundation/role_context/chaosheng_wujian_avm.jinja2"
    description: "定义 AI 的角色和任务背景"
  
  - template: "layer1_foundation/terminology/chaosheng_wujian_avm.jinja2"
    description: "定义关键术语和缩写"


# 输入数据组件（动态组合）
# 类似 tasks，支持条件渲染和自动编号
inputs:
  - name: "**输入图像（AVM / 鱼眼）**"
    template: "layer2_input/images_avm_yuyan.jinja2"
    description: "多视角图像说明（含可选鱼眼）"

  - name: "**黄色 PARK_FREESPACE 障碍（类别与质心）**"
    template: "layer2_input/yellow_freespace_avm.jinja2"
    description: "已绘制黄线的 freespaceType 与质心像素坐标"
  - name: "**红色超声检测质心位置信息 (Location Information of Red Ultrasonic Centroids)**"
    template: "layer2_input/detection_point_avm.jinja2"
    description: "AVM 图像上红色超声标记质心像素坐标"


# 任务列表（动态组合并生成 Schema）
# 每个任务对应最终输出 JSON 的一个字段
tasks:
  - name: "**判断红色超声标记是否是误检 (Determine whether the given detection point is a false detection)**"
    template: "layer3_analysis/chaosheng_wujian_avm.jinja2"
    description: "任务流程"


# 输出格式配置
output_format:
  template: "layer4_output/chaosheng_wujian_avm.jinja2"
  description: "输出格式"