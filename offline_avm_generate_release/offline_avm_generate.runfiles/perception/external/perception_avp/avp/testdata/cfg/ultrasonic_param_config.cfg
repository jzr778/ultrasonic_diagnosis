
process_v1_param: {
  ego_curve_param: {
    angle_res: 3  # degree
    dafault_front_radius: 0.65
    dafault_rear_radius: 0.65
  }
  egobox_offset: {
    top: 0.0  # meter
    bottom: 0.0  # meter
    left: 0.15  # meter
    right: 0.15  # meter
  }
  min_dis: 0.01  # meter
  max_dis: 5.0
  farthest_dis: 5.11  # 5.1m is seted as -1 by sensor
  fov_scale: 1.0  # original fov is 80 or 100 or 120
  fake_fov_scale: 1.0  # for which uss sensor not activate
  buffer_size: 100
  time_match_tolerance: 0.15  # second
  important_uss_dis_thresh: 0.0 #new feature, not filtered out by fake uss 
  uss_offset: 0.0  # meter
  direct_output_distance: 0.0
  max_arc_distance: 0.5
  num_max_items: 1  # obstacle memory buffer
  max_memory_time: 12  # second
  low_valid_frame_thresh: 7
  upper_valid_frame_thresh: 8
  min_point_num: 3
  use_tracking: true
  fuse_uss: true
  filter_egobox: true
  is_v2_pdc: false
}


process_v2_param: {
  egobox_offset: {
    top: 0.0  # meter
    bottom: 0.0  # meter
    left: 0.0  # meter
    right: 0.0  # meter
  }
  sensor_name: 'bosch_obstacle'
  expand_length_for_point_type: 0.05 # m
  confidence_thresh: 60.0
  confidence_thresh_for_tte: 10.0
  num_max_items: 20
  max_track_memory_time: 12
  stable_uss_continue_detection_count: 6
  max_valid_to_publish_track_age: 3
  max_match_distance_for_horn: 0.3
  using_period_uss: true
}

process_v2_pdc_param: {
  ego_curve_param: {
    angle_res: 3  # degree
    dafault_front_radius: 0.65
    dafault_rear_radius: 0.65
  }
  egobox_offset: {
    top: 0.0  # meter
    bottom: 0.0  # meter
    left: 0.15  # meter
    right: 0.15  # meter
  }
  min_dis: 0.01  
  max_dis: 5.0  
  farthest_dis: 5.11  # meter
  fov_scale: 1.0  # original fov is 80 or 100 or 120
  fake_fov_scale: 1.0  # for which uss sensor not activate
  buffer_size: 100
  time_match_tolerance: 0.15  # second
  important_uss_dis_thresh: 0.0 #new feature, not filtered out by fake uss 
  uss_offset: 0.0  # meter
  direct_output_distance: 0.0
  max_arc_distance: 0.5
  num_max_items: 1  # obstacle memory buffer
  max_memory_time: 12  # second
  low_valid_frame_thresh: 7
  upper_valid_frame_thresh: 8
  min_point_num: 3
  use_tracking: true
  fuse_uss: true
  filter_egobox: true
  is_v2_pdc: true
  fusion_buff_duration: 0.3
  confidence_thresh: 60.0
}
ultrasonic_topic: '/sensors/ultrasonic/combined_ultrasonic'
ultrasonic_config_path: './cfg/ultrasonics.cfg'
confidence: 0.5
focre_use_pdc_distance: false

## use for debug 
debug_ultrasonic_process_param{
  debug: false
  debug_vis: false
  debug_vis_save_path: '/sandbox/debug/uss'
  disable_uss: false
}