grid_params: {
  rows: 300
  cols: 300
  resolution: 0.1
}

preprocessor_params: {
  ultrasonic_search_distance: 3.5
  lidar_obstacle_expand_distance: 0.075
  default_min_camera_freespace_confidence: 0.2
  max_camera_cluster_wcs_distance: 0.5
  min_camera_static_type_confidence: 0.4
  min_camera_others_type_confidence: 0.25
  # image_boundary_thresh: 2
  interpolate_ratio: 4
  interpolate_distance_thresh: 1.0
  lidar_search_distance: 25.0
  log_occupied: 5.0 # origin value: log(0.9 / (1-0.9) = 2.197
  log_passed: -3.5  # origin value: log((1-0.7) / 0.7) = -0.847
  ultrasonic_log_occupied: 5.0
  ultrasonic_log_passed: -3.5
  occupied_val_attenuation: 0.35
  ultrasonic_occupied_val_attenuation: 0.35
  occupied_frame_window: 6
  passed_frame_window: 3
  static_occupied_frame_window: 11
  static_passed_frame_window: 13
  other_log_occupied: 15.0
  dilation_size: 0
  debug_params: {
    enable_camera_freespace_debug_mode: true
    enable_parking_space_visualization: false
  }
}

detector_params: {
  max_search_depth: 50
  max_search_depth_for_polyline: 150
  min_num_cluster_points: 3
  ego_expand_distance: 0.025
  min_occupied_thresh: 25.0 # origin value: 0.8
  enable_thinning: true
  max_thinning_iterate_number: 5
  enable_polyline_dp: true
  dp_accuracy_threshold: 0.05
  debug_params: {
    enable_ego_vehicle_visualization: false
    enable_gridmap_save_canvas: true
    canvas_save_path: '/sandbox/debug/gridmap'
  }
}

postprocessor_params: {
  filter_parkspace: true
  ultrasonic_fusion_distance: 0.3
  ultrasonic_fusion_distance_for_low: 1.0
  ultrasonic_expand_distance_thresh: 4.0
  ultrasonic_expand_length: 0.8
  min_filter_chock_pitch_diff: 0.1
  min_valid_area: 0.01
  min_valid_perimeter: 0.2
  min_around_distance: 0.05
  min_using_cone_distance: 6.0
  debug_params: {
    enable_visual_published_obstacles: false
    enable_output_speed_bump: true
  }
}

speed_bump_detector_params: {
  speed_bump_default_width: 0.4
  max_distance_between_points_for_clustering: 0.8
  min_num_points_for_clustering: 4
  max_distance_to_ego_for_speed_bump_detection: 6.0
  max_distance_between_line_segments: 2.2
  max_angle_diff_between_line_segments: 15.0
  debug_params: {
    enable_debug_speed_bump_obstacles: false
  }
}

speed_bump_tracker_params: {
  speed_bump_track_associator_max_match_distance: 1.0
  max_num_speed_bump_track_observations: 20
  max_num_gap_iterations_for_removing_speed_bump_track: 10
  max_valid_to_publish_speed_bump_track_age: 5
  min_publish_speed_bump_track_time: 0.4
  speed_bump_track_associator_max_polygon_distance: 1.2
  speed_bump_track_associator_min_overlap_ratio: 0.1
  max_angle_diff_between_line_segments: 20.0
  max_distance_to_ego_center_for_removing_speed_bump_track: 8.0
  min_keep_speed_bump_track_age: 10
}

vehicle_detector_params: {
  max_vehicle_cluster_distance: 10.0
  min_num_vehicle_cluster_points: 3
  max_distance_between_points_for_clustering: 0.5
  debug_params: {
    enable_publish_vehicle_obstacles: false
  }
}

pedestrian_detector_params: {
  max_pedestrian_cluster_distance: 6.0
  min_num_pedestrian_cluster_points: 3
  max_distance_between_points_for_clustering: 0.25
  debug_params: {
    enable_publish_pedestrian_obstacles: false
  }
}

vis_track_tracker_params: {
  vis_pillar_track_associator_max_match_distance: 2.0
  max_num_vis_track_observations: 20
  max_num_gap_iterations_for_removing_vis_track: 10
  max_valid_to_publish_vis_track_age: 5
  min_publish_vis_track_time: 0.4
  max_distance_to_ego_center_for_removing_vis_track: 10.0
  min_keep_vis_track_age: 5
  vis_parking_lock_track_associator_max_match_distance: 0.5
  min_publish_num_observations: 3
}

vis_wall_tracker_params: {
  vis_wall_track_associator_max_match_distance: 2.0
  max_num_vis_wall_track_observations: 20
  max_num_gap_iterations_for_removing_vis_wall_track: 10
  max_valid_to_publish_vis_wall_track_age: 5
  min_publish_vis_wall_track_time: 0.4
  max_distance_to_ego_center_for_removing_vis_wall_track: 20.0
  min_keep_vis_wall_track_age: 5
  min_publish_num_observations: 3
}

max_fusion_distance: 6.0
pose_buffer_capacity: 10
expand_bottom_distance_for_m7: -0.08

enable_lidar_obstacle_as_fusion_input: true
enable_ultrasonic_obstacle_as_fusion_input: false
enable_lidar_obstacle_output: true
enable_ultrasonic_obstacle_output: true

enable_update_cell_without_observation: true
enable_motion_obstacle_fusion: false

debug_params: {
  enable_preprocessor_debug_mode: false
  enable_detector_debug_mode: false
  enable_postprocessor_debug_mode: false
  disable_obstacle_publisher: false
}

avp_vis_obstacle_params: {
  max_pillar_length: 1.5
  min_pillar_length: 0.3
  min_nearby_pillar_distance: 2.0
}

freespace_model_params: {
  debug_flag: false
  save_dir: '/sandbox/debug/'
}

