shrink_param: {
  delta_width: -0.4
  delta_length: -0.6
}
# for detection
det_blind_spot: {  
  minradius: 4.0        # meter, detect sector minimal radius
  midradius: 8.0        # meter, detect sector middle radius
  maxradius: 22.0       # meter, detect sector maximal radius
  theta: 120.0          # degree, detect sector fov
  pt_num: 1200          # point clouds threshold
  bbox_width: 0.5
  bbox_length: 0.9
  corner_joint_num: 3
  close_overlap: 0.6    # overlap threshold, polygon /  box
}
det_range: {  
  minx: -5.0       # meter
  maxx: 25.0      # meter
  miny: -15.0     # meter
  maxy: 15.0      # meter
}
extend_width: 0.30                # meter
extend_length: 0.10               # meter
delta_edge_distance: 0.10
twin_vertical_gap: 0.35           # egocar_width(2.27 for AT5-3) + twin_vertical_gap >= parkspace_width
twin_horizontal_gap: 0.70         # egocar_length(4.77 for AT5-3) + twin_horizontal_gap >= parkspace_length
twin_rhombic_gap: 0.60            # use twin_vertical_gap value for temporary
twin_compensate_dist: 0.3         # second delta if has more space
angle_diff_center2length: 70      # degree, for twin space, angle of obstacles center vector and length (one of obstacle)
min_rel_heading_diff: 25          # degree, angle diff thresh for center-align
max_rel_heading_diff: 30          # degree, for twin space, obstacle angle diff thresh
pigeon_out_heading_thresh: 8.0    # degree, angle thresh for horizontal pigeon/out toed generate
stagger_diff_thresh: 5.0          # meter, avoid generate fake twin space
logical_valid_distance: 1.1       # meter, not use now
single_angle_diff_thresh: 18      # degree, angle diff thresh for separate vertical and rhombic type
single_vertical_gap: 0.30         # meter, single vertical space gap
single_horizontal_gap: 0.65       # meter, single horizontal space gap
single_rhombic_gap: 0.30          # meter, single rhombic space gap
angular_speed_norm_thresh: 4.0   
linear_speed_norm_thresh: 2.0
min_steering_angle_thresh: 10.0
max_steering_angle_thresh: 15.0
confidence_score_thresh: 0.50

# for tracker
track_range: 15.0 # in track range but not matched detection
                  # should consider the cars which generated park space!
inspec_range: {   
  minx: -10       # meter
  maxx: 10        # meter
  miny: -8        # meter
  maxy: 8         # meter
}
min_id: 10000     # space park start with 10001
max_id: 20000     # space park end with 20000
match_score: 0.3  # 1 - iou
heading_smooth_momentum: 0.3
dropout_score_thresh: 0.50  # 1 - iou
insert_score_thresh: 0.50   # iou
max_track_miss_cnt: 15
min_det_cnt: 5
max_det_cnt: 12
track_memory_cnt: 600
fuse_heading_diff_thresh: 0.01

# for memory
memory_range: 11.0   # meter

# for release
distace_center2center_min: 1.5
distace_center2center_max: 2.0

# for tuner 
refine_velocity_thresh: 0.10      # refine speed condition      
refine_parallel_angle: 10.0       # horizontal curb refine condition: ego heading must be parallel with space
vertical_neighbor_refine_condition:{
  distance: 6.0
  tuner_angle: 15.0
  stop_angle: 5.0
  stop_iou: 0.25
  heading_diff_vertical: 8.0
  heading_diff_horizontal: 30.0
}
horizontal_neighbor_refine_condition:{
  distance_range: {
    min: 2.0
    max: 4.2
  }
  tuner_angle: 25.0
  stop_angle: 15.0
  stop_iou: 0.75
  heading_diff_horizontal: 30.0
}
rhombic_neighbor_refine_condition:{
  refine_domain: {
    minx: -4.8
    maxx: 4.8
    miny: -3.5
    maxy: 3.5
  }
  tuner_angle: 40.0
  stop_angle: 10.0
  stop_iou: 0.50
}
vertical_outside_refine_condition: {
  distance: 4.0
  stop_iou: 0.75
}
horizontal_outside_refine_condition: {
  distance: 4.0
  stop_iou: 0.10
}
rhombic_outside_refine_condition: {
  distance: 2.5
  stop_iou: 0.80
}

dilate_distance_vertical:{      # refine search range for vertical and rhombic space
  top: 0.8
  bottom: 0.8
  left: 1.2
  right: 1.2
}
dilate_distance_horizontal:{    # refine search range for horizontal space
  top: 1.5
  bottom: 1.5
  left: 0.8
  right: 0.8
}
vertical_bound:{                #  refine obstacle distance limit value for vertical and rhombic space
  top: 0.01       
  bottom: -0.01
  left: -0.03 
  right: 0.03
}
horizontal_bound:{              #  refine obstacle distance limit value for horizontal space
  top: 0.03        
  bottom: -0.03
  left: -0.000001
  right: 0.000001
}
outside_search_distance:{       # refine curb search range
  vertical: 0.20         
  horizontal: 0.35
}
curb_distance_interval: {       # refine curb distance interval
  max_vertical: 0.15
  min_vertical: 0.10     
  max_horizontal: 0.04
  min_horizontal: 0.03
}
erosion_distance: {             # distance params in case curb inner space
  vertical: 0.45
  horizontal: 0.25
  rhombic: 0.35
}

release_smoother: 0
parking_space_exp_momentum: 0.30  # exponential smooth momentum
refine_outside_dist_ratio: 1.0
refine_dropout_thresh: 0.90
refine_obj_dist_thresh: 10.0
refine_bias_thresh: 0.15
refine_freespace_bias: 0.05
refine_freespace_confidence_thresh: 0.48

# kalman filter
kf_process_error: 0.01
kf_min_move_distance: 0.005
kf_max_move_distance: 0.5
# exponential filter
exponential_order: 3
# particle filter
nums_of_particles: 50

max_ultrasonic_dist: 0.25
min_ultrasonic_dist: 0.10

curb_fit_order: 1                   # curb curve fitting: use straight line 
curb_heading_fusion_diff: 4.0       # threshold for heading fusion by using curb
curb_smooth_param: 0.1              # curb heading fusion smooth param
curb_mad_thresh: 1.0                # threshhold for curb outliers
heading_refine_thresh: 2.0
refine_shrink_param: {
  delta_width: 0.0
  delta_length: -2.0
}

# for vis
vis_range: {  # meter
  minx: -6
  maxx: 6
  miny: -6.5
  maxy: 6.5
}

# for enable switch
enable_track: true
enable_inspector: true
enable_refine: true
enable_outside_refine: true
enable_refine_velocity_thresh: false
enable_ultrasonic_refine: true
enable_heading_refine: true
output_filter_egocar: true
det_filter_empty: true

# for debug
debug_det: false
debug_track: false
debug_inspector: false
debug_release: false
debug_tuner: false